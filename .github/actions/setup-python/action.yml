# .github/actions/setup-python/action.yml
# ─────────────────────────────────────────────────────────────────────────────
# Composite Action: Setup Python
# Bundles: python install + pip cache + dependency install + lint
#
# Usage in any workflow:
#   - uses: ./.github/actions/setup-python
#     with:
#       python-version: "3.12"
#       run-lint: "true"
# ─────────────────────────────────────────────────────────────────────────────

name: Setup Python Environment
description: >
  Composite action — installs Python, restores pip cache keyed on
  requirements hash, installs dependencies, and optionally runs lint.
  Reusable across CI, matrix, and release workflows.

# ── Inputs ────────────────────────────────────────────────────────────────────
inputs:
  python-version:
    description: Python version to install (e.g. "3.12")
    required: false
    default: "3.12"

  requirements-file:
    description: Path to requirements file
    required: false
    default: requirements.txt

  dev-requirements-file:
    description: Path to dev requirements file (for lint/test deps)
    required: false
    default: requirements-dev.txt

  run-lint:
    description: Whether to run flake8 + mypy lint check ("true"/"false")
    required: false
    default: "true"

  working-directory:
    description: Working directory for the action
    required: false
    default: "."

# ── Outputs ───────────────────────────────────────────────────────────────────
outputs:
  python-version:
    description: Actual Python version that was installed
    value: ${{ steps.setup.outputs.python-version }}

  cache-hit:
    description: Whether pip cache was restored ("true"/"false")
    value: ${{ steps.pip-cache.outputs.cache-hit }}

# ── Steps ─────────────────────────────────────────────────────────────────────
runs:
  using: composite

  steps:
    # Step 1 — Install Python
    - name: Setup Python ${{ inputs.python-version }}
      id: setup
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    # Step 2 — Compute cache key from requirements hash
    # Cache key includes: OS + python version + hash of both requirements files
    # → cache busts automatically when any dep changes
    - name: Compute pip cache key
      id: cache-key
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        HASH=$(cat ${{ inputs.requirements-file }} ${{ inputs.dev-requirements-file }} 2>/dev/null | sha256sum | cut -d' ' -f1)
        echo "key=pip-${{ runner.os }}-py${{ inputs.python-version }}-${HASH}" >> $GITHUB_OUTPUT
        echo "📦 Cache key: pip-${{ runner.os }}-py${{ inputs.python-version }}-${HASH}"

    # Step 3 — Restore pip cache
    - name: Restore pip cache
      id: pip-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ steps.cache-key.outputs.key }}
        restore-keys: |
          pip-${{ runner.os }}-py${{ inputs.python-version }}-
          pip-${{ runner.os }}-

    # Step 4 — Install dependencies
    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        python -m pip install --upgrade pip
        if [ -f "${{ inputs.requirements-file }}" ]; then
          echo "📥 Installing ${{ inputs.requirements-file }}"
          pip install -r ${{ inputs.requirements-file }}
        fi
        if [ -f "${{ inputs.dev-requirements-file }}" ]; then
          echo "📥 Installing ${{ inputs.dev-requirements-file }}"
          pip install -r ${{ inputs.dev-requirements-file }}
        fi

    # Step 5 — Lint (conditional)
    - name: Run lint checks
      if: inputs.run-lint == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "🔍 Running flake8..."
        # Note: Added 'pip install flake8 mypy' here to ensure they exist for the check
        pip install flake8 mypy
        flake8 src/ \
          --max-line-length=120 \
          --ignore=E501,W503 \
          --statistics

        echo "🔍 Running mypy type check..."
        mypy src/ \
          --ignore-missing-imports \
          --no-error-summary || true

        echo "✅ Lint complete"
