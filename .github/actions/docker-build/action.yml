# .github/actions/docker-build/action.yml
# ─────────────────────────────────────────────────────────────────────────────
# Composite Action: Multi-Arch Docker Build + Push to ECR
# Builds amd64 + arm64 image using buildx with layer caching.
# Pushes to AWS ECR with semver + sha tags.
#
# Usage:
#   - uses: ./.github/actions/docker-build
#     with:
#       image-name: cd010-app
#       tag: ${{ github.sha }}
#       ecr-registry: 123456789.dkr.ecr.ap-south-1.amazonaws.com
# ─────────────────────────────────────────────────────────────────────────────

name: Docker Multi-Arch Build & Push
description: >
  Composite action — sets up Docker buildx, enables multi-platform builds
  (amd64 + arm64), restores Docker layer cache, builds image, and
  pushes to AWS ECR with multiple tags.

# ── Inputs ────────────────────────────────────────────────────────────────────
inputs:
  image-name:
    description: Docker image name (without registry prefix)
    required: true

  tag:
    description: Primary image tag (e.g. git SHA or semver)
    required: true

  ecr-registry:
    description: AWS ECR registry URL (e.g. 123456789.dkr.ecr.ap-south-1.amazonaws.com)
    required: true

  dockerfile:
    description: Path to Dockerfile
    required: false
    default: Dockerfile

  context:
    description: Docker build context directory
    required: false
    default: "."

  platforms:
    description: Target platforms (comma-separated)
    required: false
    default: linux/amd64,linux/arm64

  push:
    description: Whether to push the image ("true"/"false")
    required: false
    default: "true"

  build-args:
    description: Docker build args (newline-separated KEY=VALUE)
    required: false
    default: ""

# ── Outputs ───────────────────────────────────────────────────────────────────
outputs:
  image-uri:
    description: Full image URI with tag (registry/name:tag)
    value: ${{ steps.meta.outputs.tags }}

  image-digest:
    description: Image digest (sha256:...)
    value: ${{ steps.build.outputs.digest }}

# ── Steps ─────────────────────────────────────────────────────────────────────
runs:
  using: composite

  steps:
    # Step 1 — Set up QEMU for cross-platform emulation (arm64 on amd64 runner)
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: ${{ inputs.platforms }}

    # Step 2 — Set up Docker Buildx (multi-platform builder)
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v3
      with:
        install: true
        driver-opts: |
          image=moby/buildkit:latest

    # Step 3 — Generate Docker metadata (tags + labels)
    # Automatically generates:
    #   - :sha-<commit>
    #   - :latest
    #   - :<semver> if tag input matches v*.*.* pattern
    - name: Generate Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.ecr-registry }}/${{ inputs.image-name }}
        tags: |
          type=raw,value=${{ inputs.tag }}
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=sha,prefix=sha-,format=short
          type=semver,pattern={{version}},enable=${{ startsWith(inputs.tag, 'v') }}
          type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(inputs.tag, 'v') }}
        labels: |
          org.opencontainers.image.title=CD010 App
          org.opencontainers.image.description=CD-010 GitHub Actions Advanced CI/CD
          org.opencontainers.image.vendor=Next Afield
          maintainer=Bhavishya Raj

    # Step 4 — Restore Docker layer cache
    # Uses GitHub Actions cache keyed on Dockerfile + requirements hash
    - name: Restore Docker layer cache
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: buildx-${{ runner.os }}-${{ inputs.image-name }}-${{ hashFiles(inputs.dockerfile, 'requirements*.txt') }}
        restore-keys: |
          buildx-${{ runner.os }}-${{ inputs.image-name }}-
          buildx-${{ runner.os }}-

    # Step 5 — Build and push multi-arch image
    - name: Build and push multi-arch image
      id: build
      uses: docker/build-push-action@v5
      with:
        context:    ${{ inputs.context }}
        file:       ${{ inputs.dockerfile }}
        platforms:  ${{ inputs.platforms }}
        push:       ${{ inputs.push }}
        tags:       ${{ steps.meta.outputs.tags }}
        labels:     ${{ steps.meta.outputs.labels }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max
        provenance: true    # SBOM provenance attestation
        sbom:       true    # Software Bill of Materials

    # Step 6 — Move cache (prevents unbounded cache growth)
    - name: Move Docker cache
      shell: bash
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
        echo "✅ Docker layer cache updated"

    # Step 7 — Print image summary
    - name: Print image summary
      shell: bash
      run: |
        echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| Image | \`${{ inputs.ecr-registry }}/${{ inputs.image-name }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Tag | \`${{ inputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Platforms | \`${{ inputs.platforms }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
