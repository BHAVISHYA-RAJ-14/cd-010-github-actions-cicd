# cliff.toml
# ─────────────────────────────────────────────────────────────────────────────
# git-cliff configuration — CHANGELOG auto-generation
# Parses conventional commits: feat, fix, docs, chore, refactor, test, ci
# Used in: .github/workflows/release.yml Step 5
# Docs: https://git-cliff.org/docs/configuration
# ─────────────────────────────────────────────────────────────────────────────

[changelog]
# Header shown at top of every CHANGELOG
header = """
# Changelog\n
All notable changes to CD-010 GitHub Actions Advanced CI/CD.\n
Format: [Conventional Commits](https://www.conventionalcommits.org/)\n
"""

# Jinja2 template for each release section
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}⚠️ **BREAKING:** {% endif %}\
  {{ commit.message | upper_first }} \
  ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))\
  {% if commit.author.name %} by **{{ commit.author.name }}**{% endif %}\
{% endfor %}
{% endfor %}\n
"""

footer = """
---
*Generated by [git-cliff](https://git-cliff.org)*
"""

# Don't include commits that only change docs/chore in releases
trim = true

[git]
# Parse conventional commits
conventional_commits = true
filter_unconventional = true
split_commits = false

# Regex for extracting info from commit messages
commit_parsers = [
  { message = "^feat",     group = "🚀 Features"          },
  { message = "^fix",      group = "🐛 Bug Fixes"          },
  { message = "^docs",     group = "📚 Documentation"      },
  { message = "^perf",     group = "⚡ Performance"         },
  { message = "^refactor", group = "♻️  Refactor"           },
  { message = "^test",     group = "🧪 Testing"             },
  { message = "^ci",       group = "👷 CI/CD"               },
  { message = "^chore",    group = "🔧 Miscellaneous"       },
  { message = "^revert",   group = "⏪ Reverts"             },
  # Skip commits that don't need changelog entries
  { message = "^chore\\(release\\)", skip = true            },
  { message = "^chore\\(deps\\)",    group = "📦 Dependencies" },
  { body = ".*security",             group = "🔒 Security"  },
]

# Filter out commits with these patterns
commit_preprocessors = [
  { pattern = "\\(#([0-9]+)\\)", replace = "([#${1}](https://github.com/BHAVISHYA-RAJ-14/cd-010-github-actions-cicd/issues/${1}))" },
]

# Sort commits within groups by date (newest first)
sort_commits = "newest"

# Include tags matching semver
tag_pattern = "v[0-9].*"

# Skip tags matching these patterns (pre-releases excluded from stable changelog)
skip_tags = "v.*-beta.*|v.*-alpha.*|v.*-rc.*"

# Ignore commits before this tag
# ignore_tags = "v0.1.0"
