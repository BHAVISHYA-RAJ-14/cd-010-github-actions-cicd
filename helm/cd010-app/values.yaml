# helm/cd010-app/values.yaml — base values (overridden by values-<env>.yaml)

replicaCount: 2

image:
  repository: cd010-app
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: nginx
  host: cd010-app.local

resources:
  requests:
    cpu:    100m
    memory: 128Mi
  limits:
    cpu:    500m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

environment: dev

serviceAccount:
  create: true
  name: cd010-app
